name: CD Pipeline - Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - "backend/**" # ทำงานเฉพาะเมื่อแก้ backend
      - "frontend/**" # ทำงานเฉพาะเมื่อแก้ frontend
      - ".github/workflows/ci.yml"
      - ".github/workflows/cd.yml"

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    environment: production
    # Map secrets to env vars at job level — env context IS available in step if conditions
    env:
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}
      RENDER_BACKEND_DEPLOY_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
      RENDER_FRONTEND_DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
      BACKEND_URL: ${{ secrets.BACKEND_URL }}
      FRONTEND_URL: ${{ secrets.FRONTEND_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ env.DOCKER_HUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push backend image
        if: ${{ env.DOCKER_HUB_USERNAME != '' }}
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/course-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/course-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        if: ${{ env.DOCKER_HUB_USERNAME != '' }}
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/course-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/course-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.BACKEND_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Backend to Render
        if: ${{ env.RENDER_BACKEND_DEPLOY_HOOK != '' }}
        run: |
          curl --fail --silent --show-error --request POST \
            --url "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" \
            --header 'content-type: application/json'

      - name: Deploy Frontend to Render
        if: ${{ env.RENDER_FRONTEND_DEPLOY_HOOK != '' }}
        run: |
          curl --fail --silent --show-error --request POST \
            --url "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" \
            --header 'content-type: application/json'

      - name: Wait for deployment to settle
        if: ${{ env.RENDER_BACKEND_DEPLOY_HOOK != '' || env.RENDER_FRONTEND_DEPLOY_HOOK != '' }}
        run: sleep 45

      - name: Smoke test backend
        if: ${{ env.BACKEND_URL != '' }}
        run: |
          echo "Testing backend health..."
          curl --fail --silent "${{ secrets.BACKEND_URL }}/api/health/" || exit 1
          echo "Backend is healthy!"

      - name: Smoke test frontend
        if: ${{ env.FRONTEND_URL != '' }}
        run: |
          echo "Testing frontend..."
          curl --fail --silent "${{ secrets.FRONTEND_URL }}" > /dev/null || exit 1
          echo "Frontend is accessible!"

      - name: Notify on success
        if: success()
        run: echo "Deployment to production succeeded for commit ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: echo "Deployment failed for commit ${{ github.sha }}"
